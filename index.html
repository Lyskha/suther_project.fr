<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SutherKane</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Great+Vibes&family=Raleway:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --g:#18a84a;
  --bg:#070707;
  --w:#f0f0f0;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--w);
  font-family:Raleway,sans-serif;
  overflow:hidden;
}

/* PAGES */
.page{
  position:fixed;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
.page.active{
  opacity:1;
  pointer-events:auto;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:#000;
  border-bottom:1px solid #111;
  z-index:10;
}
.topbar button{
  color:var(--w);
  background:none;
  border:none;
  font-family:Bebas Neue;
  letter-spacing:2px;
  cursor:pointer;
}
.links button:hover{color:var(--g)}

/* HOME */
#home{
  display:flex;
  height:100vh;
}

/* SPLIT */
.half{
  flex:1;
  position:relative;
  background:#111;
  cursor:pointer;
}

/* CENTER */
.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:2;
}
.logo{
  width:140px;
  height:140px;
  border-radius:50%;
  border:2px solid var(--g);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Great Vibes";
  font-size:28px;
  background:#0f1f14;
}

/* NAV TEXT */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-family:Bebas Neue;
  font-size:40px;
  letter-spacing:3px;
  cursor:pointer;
}
.left{left:40px}
.right{right:40px}

/* SIMPLE INNER PAGE */
.inner{
  padding:80px 20px 20px;
  overflow:auto;
  height:100%;
}

h1{
  font-family:Bebas Neue;
  margin-bottom:20px;
  color:var(--g);
}
p{max-width:700px;line-height:1.6}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <button onclick="go('home')">SutherKane</button>
  <div class="links">
    <button onclick="go('music')">Musique</button>
    <button onclick="go('clip')">Clips</button>
    <button onclick="go('contact')">Contact</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="half"></div>
  <div class="half"></div>

  <div class="nav left" onclick="go('music')">MUSIC</div>
  <div class="nav right" onclick="go('clip')">CLIP</div>

  <div class="center">
    <div class="logo">SutherKane</div>
  </div>
</div>

<!-- MUSIC -->
<div id="music" class="page inner">
  <h1>Musique</h1>
  <p>Label indépendant dédié aux artistes authentiques.</p>
</div>

<!-- CLIP -->
<div id="clip" class="page inner">
  <h1>Clips</h1>
  <p>Production audiovisuelle et direction artistique.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="page inner">
  <h1>Contact</h1>
  <p>contact@sutherkane.com</p>
</div>

<script>
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
