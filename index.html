<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SutherKane</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Great+Vibes&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --g:#18a84a;
  --bg:#050505;
  --glass: rgba(255,255,255,.06);
  --text:#f2f2f2;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Raleway,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* smooth like Apple */
.page{
  position:fixed;
  inset:0;
  opacity:0;
  transform:scale(1.02);
  filter:blur(10px);
  pointer-events:none;
  transition:all .8s cubic-bezier(.2,.8,.2,1);
}

.page.active{
  opacity:1;
  transform:scale(1);
  filter:blur(0);
  pointer-events:auto;
}

/* TOPBAR glass */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  height:64px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;

  background:rgba(10,10,10,.4);
  backdrop-filter: blur(18px);
  border-bottom:1px solid rgba(255,255,255,.06);

  z-index:10;

  transform:translateY(-20px);
  opacity:0;
  transition:all .6s ease;
}

.topbar.show{
  transform:translateY(0);
  opacity:1;
}

.topbar button{
  background:none;
  border:none;
  color:var(--text);
  font-family:Bebas Neue;
  letter-spacing:2px;
  cursor:pointer;
  transition:.3s;
}

.topbar button:hover{
  color:var(--g);
  transform:translateY(-1px);
}

/* HOME */
#home{
  display:flex;
  height:100vh;
}

/* split panels */
.half{
  flex:1;
  position:relative;
  background:#0c0c0c;
  transition:all .6s cubic-bezier(.2,.8,.2,1);
  cursor:pointer;
}

.half:hover{
  transform:scale(1.02);
  filter:brightness(1.2);
}

/* center logo */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:5;
  text-align:center;

  animation:fadeIn 1.2s ease;
}

.logo{
  width:150px;
  height:150px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,.04);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,.1);

  font-family:"Great Vibes";
  font-size:28px;

  box-shadow:0 20px 60px rgba(0,0,0,.6);

  transition:transform .5s ease, box-shadow .5s ease;
}

.logo:hover{
  transform:scale(1.05);
  box-shadow:0 30px 80px rgba(24,168,74,.15);
}

/* NAV TEXT */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-family:Bebas Neue;
  font-size:42px;
  letter-spacing:3px;
  cursor:pointer;

  opacity:0;
  animation:slideIn 1s ease forwards;
}

.left{left:40px}
.right{right:40px}

.nav:hover{
  color:var(--g);
  transform:translateY(-50%) scale(1.05);
}

/* INNER PAGES */
.inner{
  padding:90px 30px;
  overflow:auto;
}

h1{
  font-family:Bebas Neue;
  color:var(--g);
  font-size:48px;
  margin-bottom:10px;

  animation:fadeUp .8s ease;
}

p{
  max-width:700px;
  line-height:1.7;
  opacity:.85;

  animation:fadeUp 1s ease;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0;transform:scale(.9)}
  to{opacity:1;transform:scale(1)}
}

@keyframes slideIn{
  from{opacity:0;transform:translateY(-50%) translateX(-20px)}
  to{opacity:1;transform:translateY(-50%) translateX(0)}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:translateY(0)}
}

/* MOBILE */
@media(max-width:768px){
  .nav{font-size:28px}
  .logo{width:120px;height:120px}
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar" id="topbar">
  <button onclick="go('home')">SutherKane</button>
  <div>
    <button onclick="go('music')">Musique</button>
    <button onclick="go('clip')">Clips</button>
    <button onclick="go('contact')">Contact</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="half" onclick="go('music')"></div>
  <div class="half" onclick="go('clip')"></div>

  <div class="nav left" onclick="go('music')">MUSIC</div>
  <div class="nav right" onclick="go('clip')">CLIP</div>

  <div class="center">
    <div class="logo">SutherKane</div>
  </div>
</div>

<!-- MUSIC -->
<div id="music" class="page inner">
  <h1>Musique</h1>
  <p>Un label indépendant centré sur la créativité et l’authenticité artistique.</p>
</div>

<!-- CLIP -->
<div id="clip" class="page inner">
  <h1>Clips</h1>
  <p>Direction artistique, tournage et production audiovisuelle haut de gamme.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="page inner">
  <h1>Contact</h1>
  <p>contact@sutherkane.com</p>
</div>

<script>
function go(page){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById(page).classList.add('active');

  const tb = document.getElementById('topbar');
  tb.classList.add('show');
}
</script>

</body>
</html>
